<svg width="980" height="520" viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Bridge terminal demo</title>
  <desc id="desc">A terminal-style demo showing Agent Bridge initializing a task, listing agents, running a review, and creating a handoff brief.</desc>
  <rect width="980" height="520" rx="18" fill="#0d1117"/>
  <rect x="22" y="22" width="936" height="476" rx="12" fill="#161b22" stroke="#30363d"/>
  <circle cx="48" cy="48" r="7" fill="#ff5f56"/>
  <circle cx="72" cy="48" r="7" fill="#ffbd2e"/>
  <circle cx="96" cy="48" r="7" fill="#27c93f"/>
  <text x="124" y="53" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">agent-bridge demo</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
    <text x="48" y="100" fill="#7ee787">$ agent-bridge init "Ship safer agent work"</text>
    <text x="48" y="130" fill="#c9d1d9">Initialized Agent Bridge</text>
    <text x="48" y="156" fill="#c9d1d9">Active task: 20260702T120000Z-ship-safer-agent-work</text>

    <text x="48" y="208" fill="#7ee787">$ agent-bridge agents</text>
    <text x="48" y="238" fill="#c9d1d9">claude   claude   Claude Code non-interactive print mode</text>
    <text x="48" y="264" fill="#c9d1d9">codex    codex    Codex CLI non-interactive exec mode</text>
    <text x="48" y="290" fill="#c9d1d9">gemini   gemini   Gemini CLI non-interactive prompt mode</text>

    <text x="48" y="342" fill="#7ee787">$ agent-bridge review "Find blind spots" --agents=claude,codex,gemini</text>
    <text x="48" y="372" fill="#c9d1d9">Review written: .agent-bridge/tasks/.../reviews/20260702T120010Z-review.md</text>

    <text x="48" y="424" fill="#7ee787">$ agent-bridge handoff codex</text>
    <text x="48" y="454" fill="#c9d1d9">Handoff written: .agent-bridge/tasks/.../handoffs/20260702T120020Z-codex.md</text>
  </g>
</svg>
